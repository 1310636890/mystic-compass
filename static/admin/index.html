<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mystic Compass — 图片管理后台</title>
  <style>
    :root {
      --bg: #0f0f23; --card: #1a1a2e; --gold: #c9a96e; --gold-dim: #8b7355;
      --text: #e8d5b7; --text-muted: #7a7a8a; --accent: #d4a574;
      --danger: #e05555; --success: #55b855; --border: rgba(201,169,110,0.15);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text); min-height:100vh;
      padding: 2rem;
    }
    header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:2rem; flex-wrap:wrap; gap:1rem;
    }
    header h1 { color:var(--gold); font-size:1.8rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 8px; border:1px solid var(--border);
      background: var(--card); color: var(--text); cursor:pointer;
      font-size:0.95rem; transition: all 0.2s;
    }
    .btn:hover { border-color: var(--gold); color: var(--gold); }
    .btn-primary { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight:600; }
    .btn-primary:hover { background: var(--accent); color: var(--bg); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: white; }
    .btn-sm { padding:0.3rem 0.8rem; font-size:0.8rem; }

    /* Auth Section */
    #auth-section {
      background: var(--card); border:1px solid var(--border); border-radius:12px;
      padding:2rem; text-align:center; margin-bottom:2rem;
    }
    #auth-section h3 { color:var(--gold); margin-bottom:0.5rem; }
    #auth-section p { color:var(--text-muted); margin-bottom:1rem; font-size:0.9rem; }
    #auth-section input {
      padding:0.6rem 1rem; border:2px solid var(--border); background:var(--bg);
      color:var(--text); border-radius:8px; width:100%; max-width:500px;
      font-size:0.95rem; text-align:center;
    }
    #auth-section input:focus { border-color:var(--gold); outline:none; }

    /* Upload Zone */
    #upload-zone {
      background: var(--card); border:2px dashed var(--border); border-radius:12px;
      padding:3rem 2rem; text-align:center; margin-bottom:2rem;
      transition: all 0.3s; cursor:pointer;
    }
    #upload-zone.dragover { border-color:var(--gold); background:rgba(201,169,110,0.05); }
    #upload-zone h3 { color:var(--gold); margin-bottom:0.5rem; }
    #upload-zone p { color:var(--text-muted); font-size:0.9rem; }
    #upload-zone input[type=file] { display:none; }

    /* Toolbar */
    .toolbar {
      display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap;
      align-items:center;
    }
    .toolbar input[type=text] {
      padding:0.5rem 1rem; background:var(--bg); border:1px solid var(--border);
      color:var(--text); border-radius:8px; flex:1; min-width:200px; font-size:0.9rem;
    }
    .toolbar input[type=text]:focus { border-color:var(--gold); outline:none; }
    .stats { color:var(--text-muted); font-size:0.85rem; }

    /* Image Grid */
    .image-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
      gap:1rem;
    }
    .image-card {
      background:var(--card); border:1px solid var(--border); border-radius:12px;
      overflow:hidden; transition: all 0.2s; position:relative;
    }
    .image-card:hover { border-color:var(--gold); transform:translateY(-2px); }
    .image-card .img-wrapper {
      width:100%; aspect-ratio:4/3; background:rgba(0,0,0,0.3);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .image-card .img-wrapper img {
      width:100%; height:100%; object-fit:contain;
      transition: transform 0.2s;
    }
    .image-card:hover .img-wrapper img { transform:scale(1.05); }
    .image-card .info {
      padding:0.8rem; font-size:0.8rem;
    }
    .image-card .info .name {
      color:var(--text); font-weight:600; margin-bottom:0.3rem;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .image-card .info .meta {
      color:var(--text-muted); display:flex; justify-content:space-between;
      font-size:0.75rem;
    }
    .image-card .actions {
      display:flex; gap:0.3rem; padding:0 0.8rem 0.8rem;
    }
    .image-card .actions .btn { flex:1; text-align:center; }

    /* Toast */
    .toast {
      position:fixed; bottom:2rem; right:2rem; padding:1rem 1.5rem;
      border-radius:8px; color:white; font-size:0.9rem; z-index:999;
      animation: slideIn 0.3s ease; max-width:400px;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

    /* Loading */
    .loading { text-align:center; padding:3rem; color:var(--text-muted); }
    .spinner { display:inline-block; width:40px; height:40px; border:3px solid var(--border);
      border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Modal */
    .modal-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7);
      display:flex; align-items:center; justify-content:center; z-index:1000;
    }
    .modal {
      background:var(--card); border:1px solid var(--gold); border-radius:16px;
      padding:2rem; max-width:90vw; max-height:90vh; overflow:auto;
    }
    .modal img { max-width:100%; max-height:70vh; display:block; margin-bottom:1rem; border-radius:8px; }
    .modal .shortcode-block {
      background:var(--bg); padding:1rem; border-radius:8px; font-family:monospace;
      font-size:0.85rem; color:var(--gold); border:1px solid var(--border);
      user-select:all; word-break:break-all; margin-bottom:1rem;
    }
    .modal .modal-actions { display:flex; gap:0.5rem; justify-content:flex-end; }

    .empty-state { text-align:center; padding:4rem 2rem; color:var(--text-muted); }
    .empty-state .icon { font-size:3rem; margin-bottom:1rem; }
    .empty-state h3 { color:var(--gold); margin-bottom:0.5rem; }

    @media (max-width:600px) {
      body { padding:1rem; }
      header h1 { font-size:1.3rem; }
      .image-grid { grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <h1>🧭 Mystic Compass · 图片管理后台</h1>
    <div>
      <span class="stats" id="image-count">-- 张图片</span>
      <button class="btn btn-sm" onclick="refreshImages()" style="margin-left:0.5rem;">🔄 刷新</button>
    </div>
  </header>

  <!-- Auth -->
  <div id="auth-section">
    <h3>🔑 GitHub 连接</h3>
    <p>输入你的 GitHub Personal Access Token 来管理图片（需要 repo 权限）</p>
    <p style="font-size:0.75rem;color:var(--text-muted);">
      点击<a href="https://github.com/settings/tokens" target="_blank" style="color:var(--gold);">这里</a>创建 Token，勾选 <strong>repo</strong> 权限
    </p>
    <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" 
           onchange="saveToken()" onkeydown="if(event.key==='Enter')saveToken()">
  </div>

  <!-- Upload Zone -->
  <div id="upload-zone" onclick="document.getElementById('file-input').click()">
    <h3>📤 拖拽图片到此处上传</h3>
    <p>或点击选择文件 · 支持 PNG, JPG, WebP, SVG, GIF · 最大 5MB</p>
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)" hidden>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" id="search-box" placeholder="🔍 搜索图片名称..." oninput="filterImages()">
    <button class="btn btn-sm" onclick="document.getElementById('upload-zone').click()">📤 上传</button>
    <button class="btn btn-sm" onclick="refreshImages()">🔄 刷新</button>
  </div>

  <!-- Image Grid -->
  <div id="image-grid" class="image-grid">
    <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
  </div>

  <!-- Preview Modal -->
  <div id="preview-modal" class="modal-overlay" style="display:none;" onclick="event.target===this && closeModal()">
    <div class="modal" id="modal-content"></div>
  </div>

  <script>
  const OWNER = '1310636890';
  const REPO = 'mystic-compass';
  const IMG_PATH = 'static/images';
  const BRANCH = 'main';
  let allImages = [];

  // -- Token Management --
  function getToken() {
    return localStorage.getItem('gh_token') || '';
  }

  function saveToken() {
    const token = document.getElementById('github-token').value.trim();
    if (!token) return;
    localStorage.setItem('gh_token', token);
    document.getElementById('auth-section').style.display = 'none';
    showToast('Token 已保存！正在加载图片...', 'success');
    refreshImages();
  }

  // -- Toast --
  function showToast(msg, type='success') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  // -- GitHub API --
  async function ghApi(endpoint, options={}) {
    const token = getToken();
    if (!token) { document.getElementById('auth-section').style.display='block'; throw new Error('No token'); }
    const res = await fetch(`https://api.github.com${endpoint}`, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' },
      ...options
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    return res.json();
  }

  // -- Load Images --
  async function refreshImages() {
    const token = getToken();
    if (!token) {
      document.getElementById('auth-section').style.display = 'block';
      document.getElementById('image-grid').innerHTML = '<div class="empty-state"><div class="icon">🔑</div><h3>请先输入 GitHub Token</h3><p>需要 repo 权限来管理图片</p></div>';
      return;
    }
    document.getElementById('auth-section').style.display = 'none';

    const grid = document.getElementById('image-grid');
    grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载图片列表...</p></div>';

    try {
      const files = await ghApi(`/repos/${OWNER}/${REPO}/contents/${IMG_PATH}?ref=${BRANCH}`);
      allImages = Array.isArray(files) ? files.filter(f => f.type === 'file' && /\.(png|jpg|jpeg|webp|svg|gif|ico)$/i.test(f.name)) : [];
      document.getElementById('image-count').textContent = `${allImages.length} 张图片`;
      renderGrid(allImages);
    } catch(e) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>加载失败</h3><p>${e.message}</p><p style="font-size:0.8rem;">检查 Token 是否有 repo 权限，或目录是否存在</p></div>`;
      if (e.message.includes('No token') || e.message.includes('401')) {
        document.getElementById('auth-section').style.display = 'block';
      }
    }
  }

  function renderGrid(images) {
    const grid = document.getElementById('image-grid');
    if (images.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">📁</div><h3>还没有图片</h3><p>拖拽图片到上方区域上传</p></div>`;
      return;
    }
    grid.innerHTML = images.map(img => `
      <div class="image-card" data-name="${img.name.toLowerCase()}">
        <div class="img-wrapper" onclick="previewImage('${img.name}', '${img.download_url}')">
          <img src="${img.download_url}" alt="${img.name}" loading="lazy">
        </div>
        <div class="info">
          <div class="name" title="${img.name}">${img.name}</div>
          <div class="meta">
            <span>${formatSize(img.size)}</span>
            <span>${img.name.split('.').pop().toUpperCase()}</span>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-sm" onclick="previewImage('${img.name}', '${img.download_url}')">👁 预览</button>
          <button class="btn btn-sm" onclick="copyShortcode('${img.name}')">📋 复制</button>
          <button class="btn btn-sm btn-danger" onclick="deleteImage('${img.name}', '${img.sha}')">🗑</button>
        </div>
      </div>
    `).join('');
  }

  function filterImages() {
    const query = document.getElementById('search-box').value.toLowerCase();
    const filtered = query ? allImages.filter(img => img.name.toLowerCase().includes(query)) : allImages;
    renderGrid(filtered);
  }

  function formatSize(bytes) {
    if (!bytes) return '--';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(1) + ' MB';
  }

  // -- Upload --
  async function handleFiles(files) {
    if (!files.length) return;
    const token = getToken();
    if (!token) { showToast('请先输入 GitHub Token', 'error'); return; }

    for (const file of files) {
      if (file.size > 5 * 1024 * 1024) {
        showToast(`${file.name} 超过 5MB 上限`, 'error');
        continue;
      }
      try {
        const base64 = await fileToBase64(file);
        const path = `${IMG_PATH}/${file.name}`;
        
        // Check if file exists
        let sha = null;
        try {
          const existing = await ghApi(`/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`);
          sha = existing.sha;
        } catch(e) { /* File doesn't exist */ }

        await ghApi(`/repos/${OWNER}/${REPO}/contents/${path}`, {
          method: 'PUT',
          body: JSON.stringify({
            message: `Upload image: ${file.name}`,
            content: base64.split(',')[1],
            branch: BRANCH,
            ...(sha ? { sha } : {})
          })
        });
        showToast(`${file.name} 上传成功！`, 'success');
      } catch(e) {
        showToast(`${file.name}: ${e.message}`, 'error');
      }
    }
    setTimeout(refreshImages, 2000);
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // -- Delete --
  async function deleteImage(name, sha) {
    if (!confirm(`确认删除 ${name}？\n\n此操作不可撤销，图片将从仓库中永久删除。`)) return;

    try {
      await ghApi(`/repos/${OWNER}/${REPO}/contents/${IMG_PATH}/${name}`, {
        method: 'DELETE',
        body: JSON.stringify({
          message: `Delete image: ${name}`,
          sha: sha,
          branch: BRANCH
        })
      });
      showToast(`${name} 已删除`, 'success');
      refreshImages();
    } catch(e) {
      showToast(`删除失败: ${e.message}`, 'error');
    }
  }

  // -- Preview --
  function previewImage(name, url) {
    const modal = document.getElementById('preview-modal');
    const content = document.getElementById('modal-content');
    const ext = name.split('.').pop().toLowerCase();
    const shortcode = ext === 'svg' 
      ? `{{</* img src="${name}" alt="描述" */>}}`
      : `{{</* img src="${name}" alt="描述" width="800" height="600" */>}}`;
    
    content.innerHTML = `
      <img src="${url}" alt="${name}" style="width:100%;max-height:60vh;object-fit:contain;border-radius:8px;">
      <p style="color:var(--text-muted);margin-bottom:0.5rem;">${name} · <a href="${url}" target="_blank" style="color:var(--gold);">打开原图</a></p>
      <p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:0.5rem;">复制以下短代码粘贴到页面内容中：</p>
      <div class="shortcode-block">${shortcode.replace('</*', '').replace('*/>', '')}</div>
      <div class="modal-actions">
        <button class="btn btn-sm" onclick="copyShortcode('${name}')">📋 复制短代码</button>
        <button class="btn btn-sm" onclick="closeModal()">关闭</button>
      </div>
    `;
    modal.style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('preview-modal').style.display = 'none';
  }

  function copyShortcode(name) {
    const ext = name.split('.').pop().toLowerCase();
    const code = ext === 'svg'
      ? `{{< img src="${name}" alt="描述" >}}`
      : `{{< img src="${name}" alt="描述" width="800" height="600" >}}`;
    
    navigator.clipboard.writeText(code).then(() => {
      showToast('短代码已复制到剪贴板！', 'success');
    }).catch(() => {
      showToast('复制失败，请手动复制', 'error');
    });
  }

  // -- Drag & Drop --
  const uploadZone = document.getElementById('upload-zone');
  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('dragover'); });
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  // -- Init --
  document.addEventListener('DOMContentLoaded', () => {
    const token = getToken();
    if (token) {
      document.getElementById('github-token').value = token;
      document.getElementById('auth-section').style.display = 'none';
      refreshImages();
    }
  });
  </script>
</body>
</html>
