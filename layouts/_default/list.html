{{ define "title" }}{{ .Title }} — {{ .Site.Title }}{{ end }}
{{ define "main" }}
<section class="section-list">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="section-intro">{{ . }}</div>{{ end }}
    <div class="grid-3">
      {{ range .Pages }}
      <article class="card">
        <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
        {{ with .Description }}<p>{{ . }}</p>{{ end }}
        <div class="card-meta">
          <time>{{ .Date.Format "January 2, 2006" }}</time>
        </div>
      </article>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
