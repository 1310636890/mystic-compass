name: Deploy Hugo to Surge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: |
            /tmp/hugo_cache
            ~/.npm
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build
        run: hugo --minify --baseURL "https://like-chess.surge.sh"

      - name: Deploy to Surge
        run: npx surge ./public --domain like-chess.surge.sh --token ${{ secrets.SURGE_TOKEN }}
