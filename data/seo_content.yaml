#   tools       → Tool pages with FAQ schema injection

faq_groups:
  - tool: kua-number-calculator
    target_page: /tools/kua-number-calculator/
    questions:
      - q: "What is my Kua number?"
        a: "Your Kua number is a personal Feng Shui number calculated from your birth year and gender. It ranges from 1 to 9 (5 splits into 2 for males and 8 for females). Use our free Kua Number Calculator above to find yours instantly."
      - q: "How do I calculate my Kua number?"
        a: "Add the last two digits of your birth year. If the sum is two digits, add those together until you get a single digit. Males subtract from 10; females add 5 (then reduce to single digit). For years after 2000, males subtract from 9 and females add 6. Our calculator does this automatically."
      - q: "What are the 4 lucky directions for my Kua number?"
        a: "Sheng Chi (wealth), Tian Yi (health), Yan Nian (relationships), and Fu Wei (stability). Each Kua number has a specific compass direction for each. Use our calculator to get your exact directions."
      - q: "Which Kua numbers are East Group?"
        a: "Kua numbers 1, 3, 4, and 9 belong to the East Group. Their lucky directions are East, Southeast, South, and North."
      - q: "Which Kua numbers are West Group?"
        a: "Kua numbers 2, 6, 7, and 8 belong to the West Group. Their lucky directions are West, Northwest, Southwest, and Northeast."
      - q: "What colors match my Kua number?"
        a: "Kua 1: black, dark blue. Kua 2/8: yellow, beige, earth tones. Kua 3/4: green, brown. Kua 6/7: white, gold, silver. Kua 9: red, purple. Wear and decorate with your element's colors."

  - tool: flying-star-chart
    target_page: /tools/flying-star-chart/
    questions:
      - q: "What is the Flying Star chart for 2026?"
        a: "The 2026 Flying Star chart shows where the 9 energy stars land in your home this year. Star 1 (white) is in Southeast, Star 8 (wealth) is in South, and Star 5 (misfortune) is in Northeast. Use our free chart tool to see all 9 positions."
      - q: "Which Flying Star brings wealth in 2026?"
        a: "Star 8 (white) is the wealth star. In 2026 it sits in the South sector. Activate this area with earth-element items like crystals, yellow decor, or ceramic objects."
      - q: "How do I fix bad Flying Stars?"
        a: "Each negative star has a remedy: Star 2 (illness) needs metal — 6-rod wind chimes. Star 5 (misfortune) needs metal + stillness — avoid noisy activities in that sector. Star 3 (conflict) needs fire — red items or lighting."
      - q: "What does Star 5 mean in Flying Star?"
        a: "Star 5 (yellow misfortune) is the most challenging annual star. It brings obstacles, illness, and financial trouble. In 2026 it occupies Northeast. Keep this area quiet, add metal elements, and avoid renovations here."

  - tool: bagua-map-overlay
    target_page: /tools/bagua-map-overlay/
    questions:
      - q: "How do I overlay a Bagua map on my floor plan?"
        a: "Stand at your front door facing into the room. Align the Career (Kan/Water) zone with the wall containing the door. Overlay the 8 zones clockwise: Career → Knowledge → Family → Wealth → Fame → Relationships → Creativity → Helpful People. Use our free Bagua Map tool to do this digitally."
      - q: "What is the Bagua wealth corner?"
        a: "The wealth corner (Xun) is the far-left corner from your front door, facing in. It's associated with prosperity, abundance, and financial flow. Activate it with purple, gold, living plants, and moving water."
      - q: "Where is the love corner in Bagua?"
        a: "The love and relationships corner (Kun) is the far-right corner from your front door, facing in. Use pairs of objects, rose quartz, pink decor, and soft lighting here."
      - q: "What are the 8 Bagua areas?"
        a: "Career (North), Knowledge (Northeast), Family (East), Wealth (Southeast), Fame (South), Relationships (Southwest), Creativity (West), Helpful People (Northwest). Each governs a different life area."

