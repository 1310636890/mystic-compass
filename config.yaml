baseURL: https://1310636890.github.io/mystic-compass/
locale: en_US
title: Mystic Compass — Feng Shui & Chinese Metaphysics
enableRobotsTXT: true
enableEmoji: true
summaryLength: 30
paginate: 12
paginatePath: page
taxonomies:
  category: categories
  platform: platforms
  tag: tags
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: monokai
menus:
  main:
  - identifier: reviews
    name: Reviews
    url: /reviews/
    weight: 1
  - identifier: comparisons
    name: Comparisons
    url: /vs/
    weight: 2
  - identifier: best
    name: Best Picks
    url: /best/
    weight: 3
  - identifier: guides
    name: Guides
    url: /guide/
    weight: 4
outputs:
  home:
  - HTML
  - RSS
  section:
  - HTML
  - RSS
security:
  enableInlineShortcodes: true
  funcs:
    getenv:
    - ^HUGO_
    - ^CI$
params:
  description: Your compass for Feng Shui & Chinese metaphysics. Expert reviews and
    comparisons of the best platforms, products, and courses.
  author: Mystic Compass
  googleAnalytics: ''
  social:
    twitter: ''
    pinterest: ''
  affiliate_disclaimer: We may earn a commission when you purchase through our links.
