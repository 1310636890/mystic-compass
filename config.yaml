baseURL: https://like-chess.surge.sh
locale: en_US
title: Mystic Compass — Free Feng Shui Tools & Personal Assessments
enableRobotsTXT: true
enableEmoji: true
summaryLength: 30
paginate: 12
paginatePath: page
taxonomies:
  category: categories
  tag: tags
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: monokai
menus:
  main:
  - identifier: tools
    name: Free Tools
    url: /tools/
    weight: 1
  - identifier: blog
    name: Blog
    url: /blog/
    weight: 2
  - identifier: guides
    name: Guides
    url: /guide/
    weight: 3
  - identifier: best
    name: Best Products
    url: /best/
    weight: 4
outputs:
  home:
  - HTML
  - RSS
  section:
  - HTML
  - RSS
security:
  enableInlineShortcodes: true
  funcs:
    getenv:
    - ^HUGO_
    - ^CI$
params:
  description: Free Feng Shui tools & personal assessments. Use our Kua Number Calculator, Flying Star Chart, and Bagua Map to evaluate your home and fortune — then get product picks tailored to your results.
  author: Mystic Compass
  googleAnalytics: ''
  social:
    twitter: ''
    pinterest: ''
  affiliate_disclaimer: We may earn a commission when you purchase through our links.
